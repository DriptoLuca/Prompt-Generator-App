name: Build Android APK

# Il processo si avvia automaticamente quando modifichi il codice
# oppure puoi avviarlo manualmente
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Scarica il codice del repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installa le dipendenze (Flet)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Configura Java (Necessario per Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configura Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Genera l'APK con Flet
      run: flet build apk

    - name: Rendi disponibile l'APK per il download
      uses: actions/upload-artifact@v4
      with:
        name: Generatore-Prompt-APK
        path: build/apk/app-release.apk
