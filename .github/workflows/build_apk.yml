name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'

      - name: Accetta licenze Android
        run: |
          yes | flutter doctor --android-licenses || true
          flutter doctor --android-sdk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build APK
        run: |
          pip install flet
          flet build apk --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Generatore-Prompt-APK
          path: build/apk/**/*.apk
