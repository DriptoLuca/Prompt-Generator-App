name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Scarica il codice del repository
      uses: actions/checkout@v4

    - name: Configura Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configura Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.24.0' # Versione stabile garantita

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installa Flet e dipendenze
      run: |
        pip install flet
        # Il comando build scarica automaticamente le dipendenze mancanti
        flet build apk --verbose

    - name: Rendi disponibile l'APK
      uses: actions/upload-artifact@v4
      with:
        name: Generatore-Prompt-APK
        path: build/apk/**/*.apk
