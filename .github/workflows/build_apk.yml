name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'

      - name: Accetta licenze Android
        run: |
          # Metodo manuale per forzare l'accettazione delle licenze
          mkdir -p $ANDROID_HOME/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8a7d" > $ANDROID_HOME/licenses/android-sdk-preview-license
          echo "d56f5187473751e9e1a877a88090190762957386" >> $ANDROID_HOME/licenses/android-sdk-license

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build APK
        run: |
          pip install flet
          flet build apk --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Generatore-Prompt-APK
          path: build/apk/**/*.apk
