name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Scarica il codice del repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installa Flet (Nessun requirements.txt necessario)
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Configura Java (Obbligatorio per Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Genera l'APK (Flet gestirà Flutter in autonomia)
      run: flet build apk

    - name: Rendi disponibile l'APK per il download
      uses: actions/upload-artifact@v4
      with:
        name: Generatore-Prompt-APK
        # Questa sintassi cattura l'APK a prescindere dal nome esatto generato
        path: build/apk/**/*.apk
